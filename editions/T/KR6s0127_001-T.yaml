body:
  text: 元興寺安遠律師奉聖王勅錄上經疏法華義疏十二卷嘉祥寺胡吉藏述法華新撰疏六卷分本末為十二卷吉藏述法華統略三卷分本末為六卷吉藏述法華遊意一卷吉藏述法華略疏二卷竺道生述涅槃義疏二十卷吉藏述涅槃遊意一卷吉藏述涅槃略疏十五卷法寶述涅槃義記十卷分本末為二十卷惠遠述維摩略疏五卷吉藏述維摩廣疏六卷吉藏述勝鬘經寶窟三卷分為六卷吉藏述金光明經疏一卷或為二卷吉藏述金剛般若疏四卷吉藏述大品般若略疏四卷吉藏述大品般若廣疏十卷吉藏述大品般若遊意一卷吉藏述盂蘭盆經疏一卷吉藏述彌勒經遊意一卷吉藏述華嚴經遊意一卷吉藏述仁王經疏二卷吉藏述觀無量壽經疏一卷吉藏述觀無量壽經義記一卷淨影述論疏法華論疏三卷吉藏述中論疏十卷吉藏述中論玄一卷吉藏述中論玄一卷興皇寺法朗述中論疏六卷二百六十九紙元康述百論疏三卷吉藏述十二門論疏二卷吉藏述十二門論略疏一卷吉藏述十二門論疏二卷元康述三論序疏一卷吉藏述三論玄樞二卷元康述三論玄記一卷元康述三論玄意一卷元康述三論宗要一卷十七紙元曉述三論遊意一卷碩法師述四論玄義十二卷均正述智度論疏十四卷八百四十三紙僧侃述智度論疏二十四卷一千一百四十五紙惠影述廣百論疏十卷文備述廣百論疏十卷文軌述廣百論疏十卷圓測述廣百論旨歸一卷元曉述廣百論撮要一卷元曉述掌珍論疏二卷靖邁述掌珍論疏二卷文備述掌珍論疏五卷道溫述掌珍論疏一卷神泰述掌珍論古迹一卷太賢述掌珍論料簡一卷元曉述部集論疏十卷或四卷真諦述起信論疏二卷六十九紙惠遠述起信論疏二卷四十七紙元曉述起信論疏二卷八十六紙法藏述肇論疏三卷九十六紙元康述淨名玄論八卷吉藏述法華玄論十卷吉藏述大乘玄論五卷吉藏述二諦章三卷吉藏述大乘義章二十卷惠遠述成實論義章二十卷惠影述淨名玄記四卷日本智光述一乘佛性究竟論六卷法寶述一乘佛性究竟論記六卷大安寺慶俊述大乘義章三卷羅什述大乘菩薩入道三種觀一卷羅什述二諦搜玄論一卷泰法師述已上六十九部
